name: Send WhatsApp Message

on:
  schedule:
    - cron: '*/10 10-11 * * 1-5'
  workflow_dispatch:

concurrency:
  group: whatsapp-good-morning
  cancel-in-progress: false

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug environment variables presence
        run: |
          [ -n "${TWILIO_SID}" ] && echo "TWILIO_SID=OK" || echo "TWILIO_SID=MISSING"
          [ -n "${TWILIO_TOKEN}" ] && echo "TWILIO_TOKEN=OK" || echo "TWILIO_TOKEN=MISSING"
          [ -n "${TWILIO_WHATSAPP_NUMBER}" ] && echo "TWILIO_WHATSAPP_NUMBER=OK" || echo "TWILIO_WHATSAPP_NUMBER=MISSING"
          [ -n "${MY_WHATSAPP_NUMBER}" ] && echo "MY_WHATSAPP_NUMBER=OK" || echo "MY_WHATSAPP_NUMBER=MISSING"
          [ -n "${MODE}" ] && echo "MODE=OK" || echo "MODE=MISSING"
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
          TWILIO_WHATSAPP_NUMBER: ${{ secrets.TWILIO_WHATSAPP_NUMBER }}
          MY_WHATSAPP_NUMBER: ${{ secrets.MY_WHATSAPP_NUMBER }}
          MODE: ${{ secrets.MODE }}

      - name: Run script
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
          TWILIO_WHATSAPP_NUMBER: ${{ secrets.TWILIO_WHATSAPP_NUMBER }}
          MY_WHATSAPP_NUMBER: ${{ secrets.MY_WHATSAPP_NUMBER }}
          MODE: ${{ secrets.MODE }}
        run: python -u main.py

      - name: Commit state files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/history.json data/last_sent.txt data/schedule.txt
          git commit -m "chore: update runtime state files" || echo "No changes"
          git push